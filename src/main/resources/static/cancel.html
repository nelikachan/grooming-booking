<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anulowanie wizyty</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff4d6d;
            --bg: #fefae0;
            --card: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 20px;
        }

        p {
            margin-bottom: 30px;
        }

        a {
            display: inline-block;
            padding: 12px 20px;
            background: var(--primary);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            background: #e63956;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Wizyta anulowana </h1>
    <p>Twoja rezerwacja została pomyślnie anulowana.</p>

    <a href="/booking.html">Zarezerwuj ponownie</a>
</div>

</body>
</html>
