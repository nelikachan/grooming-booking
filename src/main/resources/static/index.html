<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezerwacja wizyty</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- CALENDAR -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>

        :root {
            --primary: #ff4d6d;
            --primary-dark: #e63956;
            --bg: #fefae0;
            --card: #ffffff;
            --text: #333;
            --border: #eee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* HEADER */
        header {
            background: white;
            padding: 20px;
            text-align: center;
            font-weight: 600;
            font-size: 20px;
        }

        /* CONTAINER */
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            margin-top: 10px;
            display: block;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        /* SERVICE CARD */
        .option {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            cursor: pointer;
            background: white;
            transition: 0.2s;
            font-size: 14px;
        }

        .option:hover {
            background: #fff0f3;
        }

        .option.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--primary-dark);
        }

        /* CALENDAR */
        .flatpickr-day.selected {
            background: var(--primary);
        }

    </style>
</head>

<body>

<header>
    Łapka & Nożyczki
</header>

<div class="container">

    <h2>Rezerwacja wizyty</h2>

    <label>Wybierz usługę</label>
    <div id="services" class="grid"></div>

    <label>Data</label>
    <input id="date">

    <label>Godzina</label>
    <div id="times" class="grid"></div>

    <label>Imię i nazwisko</label>
    <input id="name">

    <label>Email</label>
    <input id="email">

    <label>Telefon</label>
    <input id="phone">

    <button onclick="book()">Umów wizytę</button>

    <div id="message"></div>

</div>

<script>

    let selectedService = null;
    let selectedTime = null;

    async function loadServices() {
        const res = await fetch("/services");
        const services = await res.json();

        const container = document.getElementById("services");

        services.forEach(s => {
            const div = document.createElement("div");
            div.className = "option";
            div.innerText = s.name;

            div.onclick = () => {
                document.querySelectorAll("#services .option").forEach(el => el.classList.remove("active"));
                div.classList.add("active");
                selectedService = s.id;
            };

            container.appendChild(div);
        });
    }

    async function loadTimes(date) {
        const res = await fetch(`/appointments/available?date=${date}`);
        const times = await res.json();

        const container = document.getElementById("times");
        container.innerHTML = "";

        times.forEach(t => {
            const div = document.createElement("div");
            div.className = "option";
            div.innerText = t;

            div.onclick = () => {
                document.querySelectorAll("#times .option").forEach(el => el.classList.remove("active"));
                div.classList.add("active");
                selectedTime = t;
            };

            container.appendChild(div);
        });
    }

    flatpickr("#date", {
        dateFormat: "Y-m-d",
        minDate: "today",
        onChange: function(_, dateStr) {
            loadTimes(dateStr);
        }
    });

    async function book() {
        const button = document.querySelector("button");

        const data = {
            serviceId: selectedService,
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            date: document.getElementById("date").value,
            time: selectedTime
        };

        button.disabled = true;
        button.innerText = "Rezerwacja...";

        const res = await fetch("/appointments", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        if (res.ok) {
            button.innerText = "Zarezerwowano";
        } else {
            button.innerText = "Błąd";
        }

        setTimeout(() => {
            button.disabled = false;
            button.innerText = "Umów wizytę";
        }, 3000);
    }

    document.addEventListener("DOMContentLoaded", loadServices);

</script>

</body>
</html>
