<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Grooming Salon</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>

        :root {
            --bg: #fdf7f9;
            --card: #ffffff;
            --accent: #e8b4b8;
            --accent-strong: #d88c95;
            --text: #2d2d2d;
            --muted: #888;
            --border: #f0dede;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .brand {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.brand-top {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(0,0,0,0.5);
}

.brand-bottom {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 600;
    letter-spacing: 0.5px;
}


        .container {
            display: flex;
            width: 1000px;
            max-width: 95%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }

        .left {
            flex: 1;
            background: linear-gradient(135deg, #f3d6db, #e8b4b8);
            padding: 60px;
        }

        .left h1 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .left p {
            color: #5a5a5a;
            line-height: 1.7;
        }

        .right {
            flex: 1;
            padding: 40px;
            background: var(--card);
        }

        .right h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            font-size: 12px;
            color: var(--muted);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 6px 0 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        input:focus {
            border-color: var(--accent);
            outline: none;
        }


        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 10px 0 20px;
        }

        .option {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .option:hover {
            background: #fcebed;
        }

        .option.active {
            background: var(--accent);
            color: #3a2b2b;
            border-color: var(--accent);
            font-weight: 500;
}


button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;

    background: var(--accent);
    color: #3a2b2b; /* не белый! мягкий тёмный */

    font-weight: 500;
    letter-spacing: 1.2px; /* делает "дороже" */
    text-transform: uppercase;

    cursor: pointer;
    transition: 0.3s;
}

        button:hover {
            background: var(--accent-strong);
        }

        .success { color: #4caf50; }
        .error { color: #e53935; }


        .flatpickr-calendar {
            border-radius: 12px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .flatpickr-day.selected {
            background: var(--accent);
        }

        .flatpickr-day:hover {
            background: #fcebed;
        }

        .flatpickr-current-month {
            font-weight: 500;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="left">
        <h1 class="brand">
            <span class="brand-top">Salon groomerski</span>
            <span class="brand-bottom">Łapka & Nożyczki</span>
        </h1>
    </div>

    <div class="right">

        <h2>Rezerwacja wizyty</h2>

        <label>Wybierz usługę</label>
        <div id="services" class="grid"></div>

        <label>Data</label>
        <input id="date">

        <label>Godzina</label>
        <div id="times" class="grid"></div>

        <label>Imię i nazwisko</label>
        <input id="name">

        <label>Email</label>
        <input id="email">

        <label>Telefon</label>
        <input id="phone">

        <button onclick="book()">ZAREZERWUJ</button>

        <div id="message"></div>

    </div>

</div>

<script>

    let selectedService = null;
    let selectedTime = null;


    async function loadServices() {
        const res = await fetch("/services");
        const services = await res.json();

        const container = document.getElementById("services");

        services.forEach(s => {
            const div = document.createElement("div");
            div.className = "option";
            div.innerText = s.name;

            div.onclick = () => {
                document.querySelectorAll("#services .option").forEach(el => el.classList.remove("active"));
                div.classList.add("active");
                selectedService = s.id;
            };

            container.appendChild(div);
        });
    }


    async function loadTimes(date) {
        const res = await fetch(`/appointments/available?date=${date}`);
        const times = await res.json();

        const container = document.getElementById("times");
        container.innerHTML = "";

        times.forEach(t => {
            const div = document.createElement("div");
            div.className = "option";
            div.innerText = t;

            div.onclick = () => {
                document.querySelectorAll("#times .option").forEach(el => el.classList.remove("active"));
                div.classList.add("active");
                selectedTime = t;
            };

            container.appendChild(div);
        });
    }

    /* CALENDAR */

    flatpickr("#date", {
        dateFormat: "Y-m-d",
        minDate: "today",
        disableMobile: true,
        onChange: function(_, dateStr) {
            loadTimes(dateStr);
        }
    });

    /* BOOK */

    async function book() {
    const button = document.querySelector("button");

    const data = {
        serviceId: selectedService,
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        date: document.getElementById("date").value,
        time: selectedTime
    };

    button.disabled = true;
    button.innerText = "Rezerwacja...";

    const res = await fetch("/appointments", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    if (res.ok) {
        button.innerText = "Zarezerwowano";
        button.style.background = "#e8b4b8"; // мягкий розовый
    } else {
        const text = await res.text();
        button.innerText = text || "Błąd";
        button.style.background = "#f3a6ad"; // мягкий красный в палитре
    }

    setTimeout(() => {
        button.disabled = false;
        button.innerText = "ZAREZERWUJ";
        button.style.background = "";
    }, 3000);
}

    document.addEventListener("DOMContentLoaded", loadServices);

</script>

</body>
</html>
